<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Chess</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://pl30219712.effectivecpmnetwork.com/d0/f8/04/d0f80468d2b9796cf5b00de3ba322b84.js"></script>
</head>
<body>
  <main class="app">
    <h1>Offline Chess</h1>
    <script defer async="async" data-cfasync="false" src="https://pl30219713.effectivecpmnetwork.com/109b7607abd2a845df825d07afb7a01c/invoke.js"></script>
    <div id="container-109b7607abd2a845df825d07afb7a01c" aria-label="Advertisement" role="complementary"></div>

    <section class="panel controls">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="pvp">Player vs Player</option>
        <option value="pvc-white">Player (White) vs Computer</option>
        <option value="pvc-black">Player (Black) vs Computer</option>
        <option value="pvp" selected>Player vs Player</option>
      </select>
      <a href="https://www.effectivecpmnetwork.com/r7eqq101?key=974b9a7e27c80cef0ab909c957f0ded7"></a>
      <label for="difficulty">Computer Strength</label>
      <select id="difficulty">
        <option value="1">Easy</option>
        <option value="2" selected>Medium</option>
        <option value="3">Hard</option>
      </select>

      <div class="buttons">
        <button id="newGameBtn" type="button">New Game</button>
        <button id="flipBtn" type="button">Flip Board</button>
        <button id="undoBtn" type="button">Undo Move</button>
      </div>
    </section>

    <section class="panel game-area">
      <div id="status" class="status">White to move</div>
      <div id="board" class="board" aria-label="Chess board"></div>
      <section class="insights" aria-label="Game insights">
        <div class="insight-card">
          <div class="insight-title">Win Probability</div>
          <div class="prob-row">
            <span id="whiteProbText">White 50%</span>
            <span id="blackProbText">Black 50%</span>
          </div>
          <div class="prob-meter">
            <div id="whiteProbFill" class="prob-fill"></div>
          </div>
        </div>
        <div class="insight-card">
          <div class="insight-title">Lost Pieces</div>
          <div class="captured-block">
            <span class="captured-label">White lost</span>
            <div id="whiteLostPieces" class="captured-pieces">None</div>
          </div>
          <div class="captured-block">
            <span class="captured-label">Black lost</span>
            <div id="blackLostPieces" class="captured-pieces">None</div>
          </div>
        </div>
      </section>
      <div class="small-note">Click a piece, then click destination square.</div>
    </section>
  </main>
  <script>
  atOptions = {
    'key' : '70c151ee5a0cc0fdf1b493bd373b9c72',
    'format' : 'iframe',

    'params' : {}
  };
  </script>
  <script defer src="https://www.highperformanceformat.com/70c151ee5a0cc0fdf1b493bd373b9c72/invoke.js"></script>

  <script src="script.js" defer></script>

    /* ensure scripts do not cause layout shifts during ad load */
    #container-109b7607abd2a845df825d07afb7a01c{content-visibility:auto;contain:layout paint;}
  </style>
  <script defer src="https://pl30219715.effectivecpmnetwork.com/8b/80/c5/8b80c5037acd3793168b45f4c5e7a2aa.js"></script>

</body>
</html>
